<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Analog & Digital</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        #digital-clock {
            font-size: 2em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <canvas id="clock" width="300" height="300"></canvas>
    <div id="digital-clock"></div>

    <script>
        const canvas = document.getElementById("clock");
        const ctx = canvas.getContext("2d");
        const radius = canvas.width / 2;

        function drawClock() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.translate(radius, radius);
            drawFace(ctx, radius);
            drawNumbers(ctx, radius);
            drawTime(ctx, radius);
            ctx.translate(-radius, -radius);
        }

        function drawFace(ctx, radius) {
            ctx.beginPath();
            ctx.arc(0, 0, radius - 10, 0, 2 * Math.PI);
            ctx.fillStyle = "white";
            ctx.fill();

            ctx.strokeStyle = "#333";
            ctx.lineWidth = 8;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, 2 * Math.PI);
            ctx.fillStyle = "#333";
            ctx.fill();
        }

        function drawNumbers(ctx, radius) {
            ctx.font = "16px Arial";
            ctx.fillStyle = "#333";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            for (let num = 1; num <= 12; num++) {
                let angle = (num * Math.PI) / 6;
                let x = Math.cos(angle) * (radius - 25);
                let y = Math.sin(angle) * (radius - 25);
                ctx.fillText(num, x, y);
            }
        }

        function drawTime(ctx, radius) {
            const now = new Date();
            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            drawHand(ctx, (hours + minutes / 60) * 30, radius * 0.5, 6);
            drawHand(ctx, (minutes + seconds / 60) * 6, radius * 0.75, 4);
            drawHand(ctx, seconds * 6, radius * 0.9, 2, "red");

            document.getElementById("digital-clock").innerHTML = now.toLocaleTimeString("id-ID");
        }

        function drawHand(ctx, angle, length, width, color = "#333") {
            ctx.beginPath();
            ctx.lineWidth = width;
            ctx.lineCap = "round";
            ctx.moveTo(0, 0);
            ctx.rotate((angle * Math.PI) / 180);
            ctx.lineTo(0, -length);
            ctx.strokeStyle = color;
            ctx.stroke();
            ctx.rotate(-(angle * Math.PI) / 180);
        }

        function updateClock() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            drawClock();
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
