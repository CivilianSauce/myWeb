<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Minimalis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }
        .product {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }
        img {
            width: 100%;
            max-width: 300px;
            border-radius: 5px;
        }
        button {
            background-color: #333;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fashion Minimalis</h1>
        
        <div class="product">
            <img src="https://via.placeholder.com/300" alt="Produk 1">
            <h2>Jaket Elegan</h2>
            <p>Jaket bergaya minimalis yang cocok untuk semua suasana.</p>
            <button>Beli Sekarang</button>
        </div>
        
        <div class="product">
            <img src="https://via.placeholder.com/300" alt="Produk 2">
            <h2>Sepatu Kasual</h2>
            <p>Sepatu nyaman dengan desain simpel dan modern.</p>
            <button>Beli Sekarang</button>
        </div>
        
        <div class="product">
            <img src="https://via.placeholder.com/300" alt="Produk 3">
            <h2>Tas Kulit</h2>
            <p>Tas kulit premium yang cocok untuk berbagai kesempatan.</p>
            <button>Beli Sekarang</button>
        </div>
    </div>
</body>
</html>
